<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Asistencia Solidaria</title>
    <link rel="stylesheet" href="./CSS/CSS-TP.css">
</head>
<body>
    <header>
        <h1 style="text-align: center;">Red Asistencia Solidaria ONG</h1>
        <nav>
            <ul>
                <li><a href="./index.html">Inicio</a></li>
                <li><a href="./Nosotros.html">Nosotros</a></li>
                <li><a href="./Programas.html">Programas</a></li>
            </ul>
        </nav>
    </header>
    <hr>
        <h2>Suamte como volunatrio</h2>
        <p>Completa el formulario o escribinos a: <a href="mailto:info@redasistenciasolidaria.org.ar">redasistenciasolidaria@gmail.org.ar</a></p>
        <form action="#" method="post">
            <label for="nombre">Nombre  Apellido</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej. Esteban Quito" required>
            <br>
            <br>
            <label for="email">Correo Electronico</label>
            <input type="email" name="email" id="email" placeholder="ejemplo@gmail.com.ar"> 
            <br>
            <br>
            <label for="tel">Telefono</label>
            <input type="tel" name="telefono" id="telefono" placeholder="+ 54 11 3504-7312" required>
            <br>
            <br>
            <label for="programa">Proramas de interés</label>
            <select name="programa" id="programa" required>
                <option value="">Elegir programa...</option>
                <option value="pldc">Primeras Lineas de Codigo</option>
                <option value="met">Mueres en la Tecnología</option>
                <option value="ec">Ecuelas Conectadas</option>
            </select>
            <br>
            <br>
            <label for="Disponibilidad">Disponibilidad</label>
            <select name="Disponibilidad" id="Disponibilidad" required>
                <option value="">Turno</option>
                <option value="Manana">Mañana</option>
                <option value="Tarde">Tarde</option>
                <option value="Noche">Noche</option>
            </select>
            <br>
            <label for="mensaje">¿Por qué qierés sumarte?</label>
            <textarea name="mensaje" id="mensaje" rows="2" placeholder="Contano un poco"></textarea>
            <br>
            <br>
            <button type="submit">Enviar</button>
        </form>
    </main>
    
</body>
</html>
